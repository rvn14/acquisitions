name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: npm run lint 2>&1 | tee lint-output.log

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check 2>&1 | tee prettier-output.log

      - name: Annotate lint failures
        if: steps.lint.outcome == 'failure'
        run: |
          echo "::error title=ESLint failed::Lint issues were found. Run 'npm run lint:fix' locally to apply automatic fixes where possible."
          {
            echo "## ESLint"
            echo
            echo "Lint issues were found."
            echo
            echo "Suggested fix:"
            echo "\`npm run lint:fix\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate formatting failures
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier check failed::Formatting issues were found. Run 'npm run format' locally to apply formatting."
          {
            echo "## Prettier"
            echo
            echo "Formatting issues were found."
            echo
            echo "Suggested fix:"
            echo "\`npm run format\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if checks failed
        if: steps.lint.outcome == 'failure' || steps.prettier.outcome == 'failure'
        run: exit 1

name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm test 2>&1 | tee test-output.log

      - name: Annotate test failures
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error title=Test suite failed::Test execution failed. Review the log output above and update the tests or implementation."
          {
            echo "## Test run"
            echo
            echo "Tests failed."
            echo
            echo "Environment:"
            echo "- NODE_ENV=$NODE_ENV"
            echo "- NODE_OPTIONS=$NODE_OPTIONS"
            echo "- DATABASE_URL configured"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 30
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## Test Summary"
            echo
            if [ "${{ steps.test.outcome }}" = "success" ]; then
              echo "Tests completed successfully."
            else
              echo "Tests failed."
            fi
            echo
            if [ -d coverage ]; then
              echo "Coverage artifacts were collected from \`coverage/\`."
            else
              echo "No \`coverage/\` directory was produced by the current test command."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
